name: 每日9点触发生成条漫

on:
  schedule:
    # 8:57 北京时间 (UTC+8) → 避开整点高峰
    - cron: "57 0 * * *"
  # 也支持手动触发（方便测试）
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 触发 Coze 工作流 → 轮询结果 → 推送微信
        run: |
          # ====== Step 1: 触发 Coze 工作流 ======
          RESPONSE=$(curl -s -X POST "https://api.coze.cn/v1/workflow/run" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"workflow_id":"${{ secrets.COZE_WORKFLOW_ID }}","parameters":{"ref_image":"https://raw.githubusercontent.com/SMOYI-cell/aaa/main/images/ref_image.png"},"is_async":true}')

          echo "触发响应: $RESPONSE"

          EXECUTE_ID=$(echo "$RESPONSE" | jq -r '.execute_id // .data.execute_id')
          CODE=$(echo "$RESPONSE" | jq -r '.code')

          if [ "$CODE" != "0" ] || [ -z "$EXECUTE_ID" ] || [ "$EXECUTE_ID" = "null" ]; then
            echo "❌ Coze 触发失败"
            exit 1
          fi
          echo "✅ 工作流已触发, execute_id=$EXECUTE_ID"

          # ====== Step 2: 轮询等待完成 ======
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10

            STATUS_RESP=$(curl -s "https://api.coze.cn/v1/workflows/${{ secrets.COZE_WORKFLOW_ID }}/run_histories/$EXECUTE_ID" \
              -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}")

            STATUS=$(echo "$STATUS_RESP" | jq -r '.data | if type == "array" then .[0].execute_status else .execute_status end')
            echo "[$ATTEMPT/$MAX_ATTEMPTS] 状态: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "✅ 工作流执行完成!"

              # ====== Step 3: 提取输出图片 ======
              # 获取外层 output → 解析 JSON → 提取 Output(大写O) → 解析 JSON → 拿 output1~4
              RAW_OUTPUT=$(echo "$STATUS_RESP" | jq -r '.data | if type == "array" then .[0].output else .output end')
              echo "外层输出: ${RAW_OUTPUT:0:200}..."

              # 解析外层 JSON，提取 Output 字段
              OUTER_JSON=$(echo "$RAW_OUTPUT" | jq 'if type == "string" then fromjson else . end')
              INNER=$(echo "$OUTER_JSON" | jq -r '.Output // .output // ""')

              # 解析内层 JSON，提取 output1~4
              IMGS_JSON=$(echo "$INNER" | jq 'if type == "string" then fromjson else . end')
              IMG1=$(echo "$IMGS_JSON" | jq -r '.output1 // ""')
              IMG2=$(echo "$IMGS_JSON" | jq -r '.output2 // ""')
              IMG3=$(echo "$IMGS_JSON" | jq -r '.output3 // ""')
              IMG4=$(echo "$IMGS_JSON" | jq -r '.output4 // ""')

              NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')

              # ====== Step 4: 推送 Server酱 → 微信 ======
              PUSH_JSON=$(jq -n \
                --arg title "📱 今日条漫已生成" \
                --arg desp "## 🎨 今日条漫\n\n![第1格](${IMG1})\n![第2格](${IMG2})\n![第3格](${IMG3})\n![第4格](${IMG4})\n\n> 🕐 生成时间：${NOW}\n\n[🔄 不满意？重新生成](https://github.com/SMOYI-cell/aaa/actions/workflows/daily-cron.yml)\n\n[📕 去小红书发帖](https://www.xiaohongshu.com)" \
                '{title: $title, desp: $desp}')

              PUSH_RESP=$(curl -s -X POST "https://sctapi.ftqq.com/${{ secrets.SERVER_SENDKEY }}.send" \
                -H "Content-Type: application/json" \
                -d "$PUSH_JSON")

              echo "推送结果: $PUSH_RESP"
              echo "✅ 完成！微信应该已收到推送"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Fail" ]; then
              ERROR_MSG=$(echo "$STATUS_RESP" | jq -r '.data | if type == "array" then .[0].error_message // "未知错误" else .error_message // "未知错误" end')
              echo "❌ 工作流执行失败: $ERROR_MSG"
              exit 1
            fi
          done

          echo "⏰ 轮询超时（超过 5 分钟）"
          exit 1
